<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pondliner.com</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f7f8;color:#173042;}
.hero{
position:relative;
padding:80px 40px;
background:linear-gradient(to right, rgba(10,35,55,.88), rgba(10,35,55,.55)),
url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
color:white;
}
.hero h1{font-size:3rem;margin-bottom:16px;font-weight:700;}
.hero p{font-size:1.1rem;max-width:650px;line-height:1.6;}
.products{
padding:50px 40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:24px;
}
.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.card img{width:100%;height:220px;object-fit:cover;}
.card-content{padding:20px;}
.card h3{margin-top:0;font-size:1.1rem;}
.price{font-weight:bold;color:#1f5f8b;}
</style>
</head>
<body>

<section class="hero">
<h1>Everything for a Clear, Healthy Pond.</h1>
<p>Premium pond liners, pumps, filtration systems, koi care, and expert guidance for every stage of your pond project.</p>
</section>

<section class="products">
<div class="card">
<img src="https://images.unsplash.com/photo-1581093458791-9d09f24e4f24?q=80&w=1200&auto=format&fit=crop">
<div class="card-content">
<h3>Pond Underlayment</h3>
<p class="price">$29.00</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522069169874-c58ec4b76be5?q=80&w=1200&auto=format&fit=crop">
<div class="card-content">
<h3>Beneficial Bacteria Starter</h3>
<p class="price">$34.00</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=1200&auto=format&fit=crop">
<div class="card-content">
<h3>Pond Pump System</h3>
<p class="price">$189.00</p>
</div>
</div>
</section>

</body>
</html>
